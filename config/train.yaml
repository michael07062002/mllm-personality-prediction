seed: 42
device: auto
compile: false

data:
  model_name: affwild2_va/internvl3_2b
  layers: [12, 13, 16]

model:
  d_model: 512
  d_state: 64
  d_conv: 4
  expand: 2
  num_mamba_blocks: 4
  mlp_ratio: 2.0
  dropout: 0.2
  agf_hidden_dim: 512

train:
  batch_size: 8
  num_workers: 0
  num_epochs: 100
  lr: 0.0001
  weight_decay: 0.001
  max_grad_norm: 0.5
  save_every_epoch_predictions: false
  log_every_epoch: true

scheduler:
  use: true
  name: reduce_on_plateau
  mode: max
  factor: 0.5
  patience: 5

outputs:
  root: outputs